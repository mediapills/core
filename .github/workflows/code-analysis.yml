# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: CI Build

on:
  push:
    branches:
      - '**'

jobs:
  checks:
    name: Static code analysis (ubuntu-latest, 3.11)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python 3.11
      uses: actions/setup-python@v2
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade tox

    - name: Static Code checks/validation
      run: |
        make pre-commit
        make linter
        make mypy

  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: checks
    env:
        TOXENV: ${{ startsWith(matrix.python-version, 'pypy') && 'pypy' || format('py{0}', matrix.python-version) }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14", "pypy-3.9"]
        exclude:
          # limit the number of Windows build jobs to optimize resource usage and control costs

          - python-version: 3.9
            os: windows-latest
          - python-version: 3.10
            os: windows-latest
          - python-version: 3.11
            os: windows-latest
          - python-version: 3.12
            os: windows-latest
          - python-version: 3.13
            os: windows-latest
          - python-version: pypy-3.9
            os: windows-latest

          - python-version: 3.9
            os: macos-latest
          - python-version: 3.10
            os: macos-latest
          - python-version: 3.11
            os: macos-latest
          - python-version: 3.12
            os: macos-latest
          - python-version: 3.13
            os: macos-latest
          - python-version: pypy-3.9
            os: macos-latest


    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade tox

    - name: Run unit tests
      env:
        TOXENV: ${{ matrix.tox-target }}
      run: |
        make test
